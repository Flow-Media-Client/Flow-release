name: Bug 报告
description: 反馈 Flow App 的功能异常、崩溃或界面问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量先更新到最新版，并确认这不是激活码、订单或授权恢复问题；售后问题请走 Flow-After-sales。
  - type: input
    id: app-version
    attributes:
      label: Flow 版本
      description: 可在 App 内或 APK 文件名 / Release 页面查看。
      placeholder: "例如: 1.2.3"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: 设备型号
      placeholder: "例如: NVIDIA Shield TV Pro / 小米电视 / Google TV Streamer"
    validations:
      required: true
  - type: input
    id: android-version
    attributes:
      label: Android / Android TV 版本
      placeholder: "例如: Android TV 12"
    validations:
      required: true
  - type: dropdown
    id: server-type
    attributes:
      label: 媒体服务器
      options:
        - Jellyfin
        - Emby
        - 两者都有
        - 与媒体服务器无关
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: 服务器版本
      placeholder: "例如: Jellyfin 10.10.7 / Emby 4.8.11.0；无关可填 N/A"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请写清楚从打开 App 到问题出现的操作路径。
      placeholder: |
        1. 打开 ...
        2. 进入 ...
        3. 点击 ...
        4. 出现 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      placeholder: "原本应该发生什么？"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      placeholder: "实际发生了什么？是否有错误提示、黑屏、闪退、卡顿等？"
    validations:
      required: true
  - type: textarea
    id: attachments
    attributes:
      label: 截图 / 录屏 / 日志
      description: 如果方便，请拖入截图、录屏或日志。日志里请先移除服务器地址、Token、账号等敏感信息。
      placeholder: "可直接粘贴或拖拽文件到这里。"
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认使用的是最新版 Flow。
          required: true
        - label: 我已搜索现有 Issues，确认没有重复反馈。
          required: true
        - label: 这不是激活码、订单或授权恢复相关问题。
          required: true
