name: 功能请求
description: 提议 Flow 新功能或现有体验改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        功能建议欢迎提交。一般想法、经验分享和不确定是否适合做成 issue 的内容，也可以先发到 Discussions。
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 请描述当前使用 Flow 时遇到的限制或不方便之处。
      placeholder: "例如: 使用遥控器在某个页面完成某个操作比较麻烦..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你希望 Flow 怎么做？
      description: 请描述期望的交互、设置项或行为变化。
      placeholder: "例如: 希望新增一个设置项 / 快捷入口 / 筛选条件..."
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 相关模块
      options:
        - 播放器
        - 媒体库 / 首页
        - 搜索 / 筛选
        - 字幕 / 音轨
        - 弹幕
        - 片头片尾跳过
        - 账号 / 服务器
        - TV 遥控器交互
        - 设置
        - 其他
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      placeholder: "如果现在有临时解决方法，或你比较过其他 App 的做法，可以写在这里。"
  - type: textarea
    id: extra
    attributes:
      label: 其他信息
      description: 可附截图、录屏、链接或更具体的使用场景。
      placeholder: "可直接粘贴或拖拽文件到这里。"
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issues / Discussions，确认没有重复建议。
          required: true
        - label: 这不是 Plex、Kodi、本地文件等当前不支持后端的请求。
          required: true
